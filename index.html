      }

      h1 {
        color: #ff8a65;
      }

      /* 遊戲卡牌(裝遊戲的容器) */
      #game-container {
        /* width: 50%; */
        display: flex;
        justify-content: center;
        margin-left: 330px;
        margin-top: 30px;
        gap: 50px;
        flex-wrap: wrap;
      }

      /* 放「英文單字、中文解釋卡片」的容器 */
      .card-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }

      /* 卡片樣式 (.card => class) */
      .card {
        padding: 15px 25px;
        background-color: #fff3e0;
        border: 2px solid #ffb74d;
        border-radius: 12px;
        cursor: pointer;
        min-width: 100px;
      }

      /* 選擇時候的樣式 */
      .selected {
        background-color: #ffe082;
        border-color: #ffca28;
      }

      /* 配對成功 */
      .matched {
        background-color: #c8e6c9;
        border-color: #81c784;
        pointer-events: none;

        visibility: hidden;
      }

      /* 錯誤顯示 */
      .wrong {
        background-color: #ffcdd2;
        border-color: #e57373;
      }

      /* 重置按鈕顏色 */
      #restart-btn {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #ffb74d;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: white;
      }

      /* (滑過)重置按鈕顏色 */
      #restart-btn:hover {
        background-color: #ff9800;
      }

      /* 配對成功清單的容器樣式(整體) */
      #matched-list-container {
        margin-left: 50px;
        display: flex;
        justify-content: right;
        align-content: center;
      }

      /* 配對成功清單的容器樣式(細節、內容樣式) */
      #matched-list {
        background: #fffde7;
        border: 2px solid #ffd54f;
        border-radius: 10px;
        padding: 15px 25px;
        min-width: 200px;

        text-align: left;
      }

      /* 配對成功清單的 title */
      #matched-list-title {
        color: #ffb300;
        font-weight: bold;
        margin-bottom: 10px;
      }

      /* 配對成功清單的 ul */
      #matched-list ul {
        padding-left: 50px;
      }

      /* 配對成功清單的 li(項目) */
      #matched-list ul li {
        padding-bottom: 10px;
      }

      #matched-list-ul .matched-item {
        cursor: pointer;
      }
    </style>

      // ✅ 點英文卡就念（Web Speech API）
      function speakEnglish(word) {
        if (!("speechSynthesis" in window)) return;

        // 避免連點疊音
        window.speechSynthesis.cancel();

        const u = new SpeechSynthesisUtterance(word);
        u.lang = "en-US"; // 想英式就改 "en-GB"
        u.rate = 0.95; // 速度：0.1~10
        u.pitch = 1; // 音高：0~2
        u.volume = 1; // 音量：0~1
        window.speechSynthesis.speak(u);
      }

      let selectedEnglish = null;
      let selectedChinese = null;

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      function renderCards() {
        $("#english-cards").empty();
        $("#chinese-cards").empty();

        shuffleArray(wordData);

        const selectedWords = wordData.slice(0, 5);

        const shuffledChinese = [...selectedWords];
        shuffleArray(shuffledChinese);

        selectedWords.forEach((item) => {
          $("#english-cards").append(`
            <div class="card english" data-word="${item.english}">${item.english}</div>
          `);
        });

        shuffledChinese.forEach((item) => {
          $("#chinese-cards").append(`
            <div class="card chinese" data-word="${item.english}">${item.chinese}</div>
          `);
        });
      }

      function resetSelections() {
        $(".selected").removeClass("selected");
        $(".wrong").removeClass("wrong");
        selectedEnglish = null;
        selectedChinese = null;
      }

      function addMatchedToList(english, chinese) {
        $("#matched-list-ul").append(
          `<li class="matched-item" data-word="${english}">
     🔊 ${english} - ${chinese}
   </li>`,
        );
      }

      function resetMatchedList() {
        $("#matched-list-ul").empty();
      }

      function checkMatch() {
        if (selectedEnglish && selectedChinese) {
          const englishWord = selectedEnglish.data("word");
          const chineseWord = selectedChinese.data("word");

          const matchedItem = wordData.find(
            (item) => item.english === englishWord,
          );

          if (englishWord === chineseWord) {
            selectedEnglish.addClass("matched");
            selectedChinese.addClass("matched");

            if (matchedItem) {
              addMatchedToList(matchedItem.english, matchedItem.chinese);
            }

            resetSelections();
          } else {
            selectedEnglish.addClass("wrong");
            selectedChinese.addClass("wrong");
            setTimeout(() => {
              resetSelections();
            }, 1000);
          }
        }
      }

      $(document).ready(function () {
        renderCards();
        resetMatchedList();

        // ✅ 點「配對成功清單」的每個項目（像喇叭）就播英文
        $(document).on("click", ".matched-item", function () {
          const word = $(this).data("word");
          speakEnglish(word);
        });

        // 點英文卡：先念，再做原本的選取/配對邏輯
        $(document).on("click", ".english", function () {
          if ($(this).hasClass("matched")) return;

          // ✅ 新增：點了就念
          speakEnglish($(this).data("word"));

          $(".english").removeClass("selected");
          selectedEnglish = $(this);
          selectedEnglish.addClass("selected");

          if (selectedChinese) {
            checkMatch();
          }
        });

        $(document).on("click", ".chinese", function () {
          if ($(this).hasClass("matched")) return;

          $(".chinese").removeClass("selected");
          selectedChinese = $(this);
          selectedChinese.addClass("selected");

          if (selectedEnglish) {
            checkMatch();
          }
        });

        $("#restart-btn").click(function () {
          resetSelections();
          renderCards();
          resetMatchedList();
        });
      });
